<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — RoofQuote AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md border border-slate-200">
    <h1 class="text-2xl font-bold text-slate-800 mb-2">RoofQuote AI</h1>
    <p class="text-sm text-slate-600 mb-6">Prototype login (credentials shown for demo).</p>
    <div class="mb-4 p-3 bg-amber-50 border border-amber-200 rounded text-sm text-amber-900">
      <strong>Username:</strong> Maria<br />
      <strong>Password:</strong> roofquote123
    </div>
    {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-sm text-red-800">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input name="username" autocomplete="username" class="w-full border border-slate-300 rounded-lg px-3 py-2" required />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" name="password" autocomplete="current-password" class="w-full border border-slate-300 rounded-lg px-3 py-2" required />
      </div>
      <button type="submit" class="w-full bg-red-700 hover:bg-red-800 text-white font-medium py-2 rounded-lg">Sign in</button>
    </form>
  </div>
</body>
</html>
