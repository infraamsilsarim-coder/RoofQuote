<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RoofQuote AI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <div class="flex min-h-screen">
    <aside class="w-52 shrink-0 bg-slate-900 text-slate-100 p-4 flex flex-col gap-2">
      <div class="text-lg font-semibold tracking-tight mb-4">RoofQuote AI</div>
      {% if user %}
      <a href="/" class="block px-3 py-2 rounded hover:bg-slate-800">Projects</a>
      <a href="/master-pricing" class="block px-3 py-2 rounded hover:bg-slate-800">Master Pricing Data</a>
      <a href="/generated-results" class="block px-3 py-2 rounded hover:bg-slate-800">Generated Results</a>
      <div class="flex-1"></div>
      <div class="text-xs text-slate-400 px-3">{{ user.username }}</div>
      <a href="/logout" class="block px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 text-sm">Log out</a>
      {% endif %}
    </aside>
    <main class="flex-1 p-6 overflow-auto">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
